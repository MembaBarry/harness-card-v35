name: Validate static app

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run parser regression tests
        continue-on-error: true
        run: npm test > parser.log 2>&1
      - name: Validate repository contract
        continue-on-error: true
        run: node scripts/validate-repository.js > validator.log 2>&1
      - name: Upload diagnostic logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-diagnostics
          path: |
            parser.log
            validator.log
